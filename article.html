<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Article</title>
<script src="lang.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

:root {
    --primary-cyan: #00d4ff;
    --primary-magenta: #ff0080;
    --accent-purple: #8b5cf6;
    --bg-dark: #0a0a0f;
    --bg-card: rgba(15, 15, 25, 0.8);
    --text-primary: #ffffff;
    --text-secondary: #a1a1aa;
    --border-glow: rgba(0, 212, 255, 0.3);
    --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0f1a 50%, #1a0f2e 100%);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 0, 128, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
}

/* Navigation */
.nav-container {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 2rem;
    padding: 1rem;
}

.nav-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    transition: all 0.3s ease;
    position: relative;
}

.nav-link:hover {
    color: var(--primary-cyan);
    background: rgba(0, 212, 255, 0.1);
}

/* Article Container */
#articleContainer {
    max-width: 800px;
    margin: 0 auto;
    padding: 2rem;
    background: var(--bg-card);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    box-shadow: var(--shadow-glow);
}

/* Article Header */
.article-header {
    text-align: center;
    margin-bottom: 3rem;
    padding-bottom: 2rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
}

.article-title {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, var(--primary-cyan), var(--primary-magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1.2;
}

.article-meta {
    color: var(--text-secondary);
    font-size: 0.9rem;
    font-family: 'JetBrains Mono', monospace;
}

/* Article Content */
.article-content {
    font-size: 1.1rem;
    line-height: 1.8;
    margin-bottom: 3rem;
}

.article-content h1, .article-content h2, .article-content h3 {
    color: var(--primary-cyan);
    margin: 2rem 0 1rem 0;
    font-weight: 600;
}

.article-content p {
    margin-bottom: 1.5rem;
    color: var(--text-primary);
}

.article-content strong {
    color: var(--primary-magenta);
    font-weight: 600;
}

.article-content em {
    color: var(--accent-purple);
}

.article-content code {
    background: rgba(0, 212, 255, 0.1);
    padding: 0.2rem 0.4rem;
    border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.9em;
    color: var(--primary-cyan);
}

/* Tags */
.article-tags {
    margin-top: 2rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

.tag {
    display: inline-block;
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    padding: 0.3rem 0.8rem;
    margin: 0.2rem;
    border-radius: 20px;
    font-size: 0.8rem;
    color: var(--primary-cyan);
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'JetBrains Mono', monospace;
}

.tag:hover {
    background: rgba(0, 212, 255, 0.2);
    border-color: var(--primary-cyan);
}

/* Related Articles */
#relatedArticles {
    margin-top: 3rem;
    padding-top: 2rem;
    border-top: 1px solid rgba(255, 255, 255, 0.1);
}

#relatedArticles h3 {
    color: var(--primary-magenta);
    margin-bottom: 1.5rem;
    font-weight: 600;
}

.related-item {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 1.5rem;
    margin: 1rem 0;
    cursor: pointer;
    transition: all 0.3s ease;
}

.related-item:hover {
    border-color: var(--primary-cyan);
    background: rgba(0, 212, 255, 0.05);
    transform: translateY(-2px);
}

.related-item-title {
    color: var(--text-primary);
    font-weight: 600;
    margin-bottom: 0.5rem;
}

.related-item-tags {
    color: var(--text-secondary);
    font-size: 0.8rem;
    font-family: 'JetBrains Mono', monospace;
}

/* Buttons */
.nav-buttons {
    margin-top: 3rem;
    display: flex;
    justify-content: center;
    gap: 1rem;
    flex-wrap: wrap;
}

button {
    background: rgba(0, 212, 255, 0.1);
    color: var(--primary-cyan);
    border: 1px solid rgba(0, 212, 255, 0.3);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
}

button:hover {
    background: rgba(0, 212, 255, 0.2);
    border-color: var(--primary-cyan);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(0, 212, 255, 0.2);
}

/* Progress Bar */
#readingProgress {
    position: fixed;
    top: 0;
    left: 0;
    width: 0%;
    height: 2px;
    background: linear-gradient(90deg, var(--primary-cyan), var(--primary-magenta));
    z-index: 1000;
    transition: width 0.3s ease;
}

/* Floating Text Animation */
.floating-text {
    position: fixed;
    font-size: 1.2rem;
    font-weight: 600;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    animation: float-up 1.5s forwards;
    z-index: 10000;
    font-family: 'JetBrains Mono', monospace;
}

@keyframes float-up {
    0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate3d(0, -60px, 0) scale(1.2);
    }
}

/* Responsive Design */
@media (max-width: 768px) {
    #articleContainer {
        margin: 1rem;
        padding: 1.5rem;
    }
    
    .article-title {
        font-size: 2rem;
    }
    
    .nav-buttons {
        gap: 0.5rem;
    }
    
    button {
        padding: 0.6rem 1rem;
        font-size: 0.9rem;
    }
}
</style>
</head>
<body>
<div class="nav-container">
    <a href="index.html" class="nav-link" data-lang="home">🏠 首页</a>
    <a href="editor.html" class="nav-link" data-lang="newPost">✍️ 新文章</a>
    <a href="settings.html" class="nav-link" data-lang="settings">⚙️ 设置</a>
</div>

<div id="articleContainer">
    <div class="article-header">
        <h1 class="article-title" id="articleTitle">Loading...</h1>
        <div class="article-meta" id="articleMeta">
            <span id="createTime"></span> • <span id="wordCount"></span> words • <span id="readTime"></span> min read
        </div>
    </div>
    
    <div class="article-content" id="articleContent">
        Loading article content...
    </div>
    
    <div class="article-tags" id="articleTags"></div>

    <div id="relatedArticles">
        <h3>🔗 Related Articles</h3>
        <div id="relatedList"></div>
    </div>

    <div class="nav-buttons">
        <button onclick="goBack()" title="返回文章列表">← 返回</button>
        <button onclick="editArticle()" title="编辑当前文章">编辑</button>
        <button onclick="exportArticle()" title="导出当前文章为文件">导出</button>
        <button onclick="shareArticle()" title="分享文章链接">分享</button>
        <button onclick="adjustFontSize(2)" title="增大文章字体">A+</button>
        <button onclick="adjustFontSize(-2)" title="减小文章字体">A-</button>
    </div>
</div>

<script>
// 获取文章索引
const urlParams = new URLSearchParams(window.location.search);
const index = parseInt(urlParams.get('index'));

// 浮现文字数组 - 简化版
const texts = [
    "✨", "💫", "⚡", "🔥", "�", "�",
    "CYBER", "TECH", "CODE", "DATA", "FUTURE", "DIGITAL"
];

const colors = [
    "#00d4ff", "#ff0080", "#8b5cf6", "#00ff88", "#ff4081", "#40e0d0"
];

// 创建浮现文字函数
function createFloatingText(x, y) {
    const textElement = document.createElement('div');
    const randomText = texts[Math.floor(Math.random() * texts.length)];
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    textElement.textContent = randomText;
    textElement.className = 'floating-text';
    textElement.style.left = x + 'px';
    textElement.style.top = y + 'px';
    textElement.style.color = randomColor;
    
    document.body.appendChild(textElement);
    
    setTimeout(() => {
        if (textElement && textElement.parentNode) {
            textElement.remove();
        }
    }, 1500);
}

// 文章相关函数
function editArticle() {
    window.location.href = `editor.html?index=${index}`;
}

function goBack() {
    const urlParams = new URLSearchParams(window.location.search);
    const tagParam = urlParams.get('tag');
    if (tagParam) {
        window.location.href = `index.html?tag=${encodeURIComponent(tagParam)}`;
    } else {
        window.location.href = 'index.html';
    }
}

function exportArticle() {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    if (articles[index]) {
        const article = articles[index];
        const content = `# ${article.title}\n\n${article.content.replace(/<[^>]*>/g, '')}\n\nTags: ${(article.tags || []).join(', ')}\nCreated: ${article.createTime || 'Unknown'}`;
        const blob = new Blob([content], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${article.title.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        alert('✅ 文章导出成功！');
    }
}

function shareArticle() {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    if (articles[index]) {
        const article = articles[index];
        const shareText = `📤 分享这篇文章：\n"${article.title}"\n${window.location.href}`;
        
        if (navigator.share) {
            navigator.share({
                title: article.title,
                text: shareText,
                url: window.location.href
            });
        } else {
            navigator.clipboard.writeText(shareText).then(() => {
                alert('📋 文章链接已复制到剪贴板！');
            }).catch(() => {
                alert(shareText);
            });
        }
    }
}

function searchByTag(tag) {
    window.location.href = `index.html?tag=${encodeURIComponent(tag)}`;
}

function loadArticle() {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    if (articles[index]) {
        const article = articles[index];
        document.getElementById('articleTitle').textContent = article.title;
        document.getElementById('articleContent').innerHTML = article.content;
        document.getElementById('createTime').textContent = new Date(article.createTime).toLocaleDateString();

        const wordCount = article.content.replace(/<[^>]*>/g, '').split(/\s+/).filter(word => word.length > 0).length;
        const readTime = Math.max(1, Math.ceil(wordCount / 200));
        document.getElementById('wordCount').textContent = wordCount;
        document.getElementById('readTime').textContent = readTime;

    if (related.length > 0) {
        relatedList.innerHTML = related.map(item => 
            `<div class="related-item" onclick="window.location.href='article.html?index=${item.realIndex}'" title="点击查看相关文章">
                <div class="related-item-title">${item.article.title}</div>
                <div class="related-item-tags">${item.article.tags ? item.article.tags.map(tag => `#${tag}`).join(' ') : ''}</div>
            </div>`
        ).join('');
    }

        loadRelatedArticles(article);
        recordReadHistory(index);
    } else {
        document.getElementById('articleTitle').textContent = '文章未找到';
        document.getElementById('articleContent').innerHTML = '<p>抱歉，找不到这篇文章。</p>';
    }
}

function loadRelatedArticles(currentArticle) {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    const related = articles
        .filter((article, idx) => idx !== index && !article.isDraft)
        .map((article, idx) => {
            let score = 0;
            if (currentArticle.tags && article.tags) {
                const commonTags = currentArticle.tags.filter(tag => article.tags.includes(tag));
                score += commonTags.length * 3;
            }
            const titleWords = currentArticle.title.toLowerCase().split(/\s+/);
            const articleTitleWords = article.title.toLowerCase().split(/\s+/);
            const commonWords = titleWords.filter(word => articleTitleWords.includes(word) && word.length > 3);
            score += commonWords.length;
            return { article, score, realIndex: articles.indexOf(article) };
        })
        .filter(item => item.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 3);

    const relatedList = document.getElementById('relatedList');
    if (related.length > 0) {
        relatedList.innerHTML = related.map(item => 
            `<div class="related-item" onclick="window.location.href='article.html?index=${item.realIndex}'">
                <div class="related-item-title">${item.article.title}</div>
                <div class="related-item-tags">${item.article.tags ? item.article.tags.map(tag => `#${tag}`).join(' ') : ''}</div>
            </div>`
        ).join('');
    } else {
        relatedList.innerHTML = '<p style="color: var(--text-secondary); text-align: center;">暂无相关文章</p>';
    }
}

function recordReadHistory(articleIndex) {
    let history = JSON.parse(localStorage.getItem('blog-read-history') || '[]');
    const now = new Date().toISOString();
    history = history.filter(item => item.index !== articleIndex);
    history.unshift({ index: articleIndex, readTime: now });
    history = history.slice(0, 50);
    localStorage.setItem('blog-read-history', JSON.stringify(history));
}

function createProgressBar() {
    const progressBar = document.createElement('div');
    progressBar.id = 'readingProgress';
    document.body.appendChild(progressBar);
}

function updateReadingProgress() {
    const scrollTop = window.pageYOffset;
    const docHeight = document.documentElement.scrollHeight - window.innerHeight;
    const scrollPercent = (scrollTop / docHeight) * 100;
    
    const progressBar = document.getElementById('readingProgress');
    if (progressBar) {
        progressBar.style.width = scrollPercent + '%';
    }
}

function adjustFontSize(change) {
    const content = document.getElementById('articleContent');
    const currentSize = parseFloat(window.getComputedStyle(content).fontSize);
    const newSize = currentSize + change;
    
    if (newSize >= 12 && newSize <= 24) {
        content.style.fontSize = newSize + 'px';
        localStorage.setItem('article-font-size', newSize);
    }
}

// 事件监听
document.addEventListener('DOMContentLoaded', function() {
    // 绑定点击事件
    document.addEventListener('click', function(e) {
        if (!e.target.closest('button, a, input, select, textarea')) {
            createFloatingText(e.clientX, e.clientY);
        }
    });
    
    // 初始化语言切换
    if (typeof createLanguageSwitcher === 'function') {
        createLanguageSwitcher();
        updatePageLanguage();
    }
    
    loadArticle();
    createProgressBar();
    
    // 恢复字体大小设置
    const savedFontSize = localStorage.getItem('article-font-size');
    if (savedFontSize) {
        const articleContent = document.getElementById('articleContent');
        if (articleContent) {
            articleContent.style.fontSize = savedFontSize + 'px';
        }
    }
});

// 键盘快捷键
document.addEventListener('keydown', function(e) {
    if (e.key === ' ' && !e.target.closest('input, textarea')) {
        e.preventDefault();
        const centerX = window.innerWidth / 2;
        const centerY = window.innerHeight / 2;
        createFloatingText(centerX, centerY);
    }
});

// 滚动进度条
window.addEventListener('scroll', updateReadingProgress);

// 检查索引有效性
if (isNaN(index) || index < 0) {
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('articleTitle').textContent = '文章未找到';
        document.getElementById('articleContent').innerHTML = '<p>无效的文章索引。</p>';
    });
}
</script>
</body>
</html>
