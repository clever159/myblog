<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>我的博客文章列表</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      margin: 0;
      padding: 20px;
      color: white;
    }

    h1 {
      text-align: center;
      margin-bottom: 30px;
    }

    #articleList {
      max-width: 800px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(8px);
    }

    .article-item {
      padding: 15px;
      background: rgba(0,0,0,0.3);
      border-radius: 8px;
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .article-title {
      font-size: 1.2rem;
      cursor: pointer;
      flex: 1;
    }

    .actions button {
      margin-left: 10px;
      background: #ff7e5f;
      border: none;
      padding: 5px 10px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
    }

    #newArticle {
      display: block;
      margin: 30px auto;
      background: #4ECDC4;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 30px;
      font-size: 1.1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>我的博客文章</h1>
  <div id="articleList"></div>
  <button id="newArticle">✍️ 新建文章</button>

  <script>
    function loadArticles() {
      const list = document.getElementById('articleList');
      list.innerHTML = '';
      const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');

      if (articles.length === 0) {
        list.innerHTML = '<p style="text-align:center;">还没有文章，点击下面按钮新建吧！</p>';
        return;
      }

      articles.forEach((article, index) => {
        const div = document.createElement('div');
        div.className = 'article-item';
        div.innerHTML = `
          <div class="article-title" onclick="openArticle(${index})">${article.title}</div>
          <div class="actions">
            <button onclick="openArticle(${index})">编辑</button>
            <button onclick="deleteArticle(${index})">删除</button>
          </div>
        `;
        list.appendChild(div);
      });
    }

    function openArticle(index) {
      window.location.href = `editor.html?index=${index}`;
    }

    function deleteArticle(index) {
      const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
      if (confirm(`确定删除 "${articles[index].title}" 吗？`)) {
        articles.splice(index, 1);
        localStorage.setItem('blog-articles', JSON.stringify(articles));
        loadArticles();
      }
    }

    document.getElementById('newArticle').addEventListener('click', () => {
      window.location.href = 'editor.html';
    });

    loadArticles();
  </script>
</body>
</html>
