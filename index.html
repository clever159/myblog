<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Blog System</title>
<script src="lang.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600&display=swap');

:root {
    --primary-cyan: #00d4ff;
    --primary-magenta: #ff0080;
    --accent-purple: #8b5cf6;
    --bg-dark: #0a0a0f;
    --bg-card: rgba(15, 15, 25, 0.8);
    --text-primary: #ffffff;
    --text-secondary: #a1a1aa;
    --border-glow: rgba(0, 212, 255, 0.3);
    --shadow-glow: 0 0 20px rgba(0, 212, 255, 0.1);
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, var(--bg-dark) 0%, #0f0f1a 50%, #1a0f2e 100%);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    padding: 2rem;
}

body::before {
    content: '';
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: 
        radial-gradient(circle at 20% 80%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 0, 128, 0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: -1;
}

#container {
    max-width: 1200px;
    margin: 0 auto;
}

/* Navigation */
.nav-container {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 3rem;
    padding: 1rem;
}

.nav-link {
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 500;
    padding: 0.5rem 1rem;
    border-radius: 8px;
    transition: all 0.3s ease;
}

.nav-link:hover {
    color: var(--primary-cyan);
    background: rgba(0, 212, 255, 0.1);
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 3rem;
}

.main-title {
    font-size: 3rem;
    font-weight: 700;
    margin-bottom: 1rem;
    background: linear-gradient(135deg, var(--primary-cyan), var(--primary-magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}

.subtitle {
    color: var(--text-secondary);
    font-size: 1.1rem;
    font-family: 'JetBrains Mono', monospace;
}

/* Search and Controls */
.controls {
    display: flex;
    gap: 1rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
}

.search-input {
    background: var(--bg-card);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    padding: 0.8rem 1rem;
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    min-width: 300px;
    backdrop-filter: blur(10px);
}

.search-input:focus {
    outline: none;
    border-color: var(--primary-cyan);
    box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.2);
}

.control-btn, .sort-select {
    background: rgba(0, 212, 255, 0.1);
    color: var(--primary-cyan);
    border: 1px solid rgba(0, 212, 255, 0.3);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    transition: all 0.3s ease;
}

.control-btn:hover, .sort-select:hover {
    background: rgba(0, 212, 255, 0.2);
    border-color: var(--primary-cyan);
}

/* Article Grid */
#articleList {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
    gap: 1.5rem;
    margin-bottom: 3rem;
}

.article-card {
    background: var(--bg-card);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 1.5rem;
    backdrop-filter: blur(20px);
    transition: all 0.3s ease;
    cursor: pointer;
}

.article-card:hover {
    border-color: var(--primary-cyan);
    transform: translateY(-4px);
    box-shadow: 0 8px 25px rgba(0, 212, 255, 0.15);
}

.article-card-title {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 0.8rem;
    color: var(--text-primary);
    line-height: 1.3;
}

.article-card-meta {
    color: var(--text-secondary);
    font-size: 0.85rem;
    margin-bottom: 1rem;
    font-family: 'JetBrains Mono', monospace;
}

.article-card-preview {
    color: var(--text-secondary);
    font-size: 0.9rem;
    line-height: 1.5;
    margin-bottom: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.article-card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
}

.tag {
    background: rgba(0, 212, 255, 0.1);
    border: 1px solid rgba(0, 212, 255, 0.3);
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
    font-size: 0.75rem;
    color: var(--primary-cyan);
    font-family: 'JetBrains Mono', monospace;
}

.article-card-actions {
    display: flex;
    gap: 0.5rem;
    justify-content: flex-end;
}

.action-btn {
    background: transparent;
    color: var(--text-secondary);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.3s ease;
}

.action-btn:hover {
    color: var(--primary-cyan);
    border-color: var(--primary-cyan);
}

/* New Article Button */
#newArticle {
    display: block;
    margin: 2rem auto;
    background: linear-gradient(135deg, var(--primary-cyan), var(--primary-magenta));
    color: white;
    border: none;
    padding: 1rem 2rem;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
}

#newArticle:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
}

/* Bottom Navigation */
.bottom-nav {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 3rem;
    flex-wrap: wrap;
}

.bottom-nav button {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-secondary);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all 0.3s ease;
}

.bottom-nav button:hover {
    color: var(--primary-cyan);
    border-color: var(--primary-cyan);
    background: rgba(0, 212, 255, 0.1);
}

/* Floating Text Animation */
.floating-text {
    position: fixed;
    font-size: 1.2rem;
    font-weight: 600;
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    animation: float-up 1.5s forwards;
    z-index: 10000;
    font-family: 'JetBrains Mono', monospace;
}

@keyframes float-up {
    0% {
        opacity: 1;
        transform: translate3d(0, 0, 0) scale(1);
    }
    100% {
        opacity: 0;
        transform: translate3d(0, -60px, 0) scale(1.2);
    }
}

/* Empty State */
.empty-state {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--text-secondary);
}

.empty-state h3 {
    font-size: 1.5rem;
    margin-bottom: 1rem;
    color: var(--text-primary);
}

/* Responsive Design */
@media (max-width: 768px) {
    body {
        padding: 1rem;
    }
    
    .main-title {
        font-size: 2rem;
    }
    
    .controls {
        flex-direction: column;
        align-items: stretch;
    }
    
    .search-input {
        min-width: auto;
    }
    
    #articleList {
        grid-template-columns: 1fr;
    }
    
    .bottom-nav {
        flex-direction: column;
    }
}
</style>
</head>
<body>
<div id="container">
    <div class="nav-container">
        <a href="index.html" class="nav-link" data-lang="home">🏠 首页</a>
        <a href="editor.html" class="nav-link" data-lang="newPost">✍️ 新文章</a>
        <a href="settings.html" class="nav-link" data-lang="settings">⚙️ 设置</a>
    </div>

    <div class="header">
        <h1 class="main-title">Cyber Blog</h1>
        <p class="subtitle">// Advanced • Minimal • Cyberpunk</p>
    </div>

    <div class="controls">
        <input type="text" id="searchInput" class="search-input" data-lang="searchPlaceholder" placeholder="🔍 搜索文章..." title="输入关键词搜索文章标题和内容">
        <button onclick="searchArticles()" class="control-btn" data-lang="search" title="执行搜索操作">搜索</button>
        <button onclick="clearSearch()" class="control-btn" data-lang="clear" title="清除搜索条件，显示所有文章">清除</button>
        <select onchange="sortArticles(this.value)" class="sort-select" title="选择文章排序方式">
            <option value="" data-lang="sortBy">排序方式...</option>
            <option value="date-new" data-lang="sortDateNew">📅 最新优先</option>
            <option value="date-old" data-lang="sortDateOld">📅 最旧优先</option>
            <option value="title" data-lang="sortTitle">🔤 标题 A-Z</option>
            <option value="words" data-lang="sortWords">📊 字数</option>
        </select>
    </div>

    <div id="articleList"></div>
    
    <button id="newArticle" onclick="window.location.href='editor.html'" data-lang="createNewPost" title="创建一篇新的博客文章">✍️ 创建新文章</button>

    <div class="bottom-nav">
        <button onclick="exportAllArticles()" data-lang="exportAll" title="将所有文章导出为JSON文件">📦 导出全部</button>
        <button onclick="showStats()" data-lang="statistics" title="查看博客统计信息">📊 统计</button>
        <button onclick="window.location.href='settings.html'" data-lang="settings" title="打开设置页面">⚙️ 设置</button>
    </div>
</div>

<script>
// 浮现文字数组 - 简化版
const texts = [
    "✨", "💫", "⚡", "🔥", "💎", "🌟",
    "CYBER", "TECH", "CODE", "DATA", "FUTURE", "DIGITAL"
];

const colors = [
    "#00d4ff", "#ff0080", "#8b5cf6", "#00ff88", "#ff4081", "#40e0d0"
];

// 创建浮现文字函数
function createFloatingText(x, y) {
    const textElement = document.createElement('div');
    const randomText = texts[Math.floor(Math.random() * texts.length)];
    const randomColor = colors[Math.floor(Math.random() * colors.length)];
    textElement.textContent = randomText;
    textElement.className = 'floating-text';
    textElement.style.left = x + 'px';
    textElement.style.top = y + 'px';
    textElement.style.color = randomColor;
    
    document.body.appendChild(textElement);
    
    setTimeout(() => {
        if (textElement && textElement.parentNode) {
            textElement.remove();
        }
    }, 1500);
}

// 事件监听
document.addEventListener('click', function(e) {
    if (!e.target.closest('button, a, input, select, textarea')) {
        createFloatingText(e.clientX, e.clientY);
    }
});

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    if (typeof createLanguageSwitcher === 'function') {
        createLanguageSwitcher();
        updatePageLanguage();
    }
    loadArticles();
    
    // 搜索功能
    document.getElementById('searchInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            searchArticles();
        }
    });
});

// 文章管理函数
function loadArticles() {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    const urlParams = new URLSearchParams(window.location.search);
    const tagFilter = urlParams.get('tag');
    
    let filteredArticles = articles.filter(article => !article.isDraft);
    
    if (tagFilter) {
        filteredArticles = filteredArticles.filter(article => 
            article.tags && article.tags.includes(tagFilter)
        );
    }
    
    displayArticles(filteredArticles);
}

function displayArticles(articles) {
    const articleList = document.getElementById('articleList');
    
    if (articles.length === 0) {
        articleList.innerHTML = `
            <div class="empty-state">
                <h3>暂无文章</h3>
                <p>开始创建您的第一篇赛博文章吧！</p>
            </div>
        `;
        return;
    }
    
    articleList.innerHTML = articles.map((article, index) => {
        const realIndex = JSON.parse(localStorage.getItem('blog-articles') || '[]').indexOf(article);
        const wordCount = article.content.replace(/<[^>]*>/g, '').split(/\s+/).filter(word => word.length > 0).length;
        const preview = article.content.replace(/<[^>]*>/g, '').substring(0, 150) + '...';
        
        return `
            <div class="article-card" onclick="window.location.href='article.html?index=${realIndex}'" title="点击查看完整文章">
                <div class="article-card-title">${article.title}</div>
                <div class="article-card-meta">
                    ${new Date(article.createTime).toLocaleDateString()} • ${wordCount} 字
                </div>
                <div class="article-card-preview">${preview}</div>
                ${article.tags ? `
                    <div class="article-card-tags">
                        ${article.tags.map(tag => `<span class="tag" title="点击搜索此标签">#${tag}</span>`).join('')}
                    </div>
                ` : ''}
                <div class="article-card-actions">
                    <button class="action-btn" onclick="event.stopPropagation(); window.location.href='article.html?index=${realIndex}'" title="查看文章详情">查看</button>
                    <button class="action-btn" onclick="event.stopPropagation(); window.location.href='editor.html?index=${realIndex}'" title="编辑这篇文章">编辑</button>
                    <button class="action-btn" onclick="event.stopPropagation(); deleteArticle(${realIndex})" title="删除这篇文章">删除</button>
                </div>
            </div>
        `;
    }).join('');
}

function searchArticles() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase();
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    
    const filtered = articles.filter(article => 
        !article.isDraft && (
            article.title.toLowerCase().includes(searchTerm) ||
            article.content.toLowerCase().includes(searchTerm) ||
            (article.tags && article.tags.some(tag => tag.toLowerCase().includes(searchTerm)))
        )
    );
    
    displayArticles(filtered);
}

function clearSearch() {
    document.getElementById('searchInput').value = '';
    loadArticles();
}

function sortArticles(sortBy) {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]').filter(article => !article.isDraft);
    let sorted;
    
    switch(sortBy) {
        case 'date-new':
            sorted = articles.sort((a, b) => new Date(b.createTime || 0) - new Date(a.createTime || 0));
            break;
        case 'date-old':
            sorted = articles.sort((a, b) => new Date(a.createTime || 0) - new Date(b.createTime || 0));
            break;
        case 'title':
            sorted = articles.sort((a, b) => a.title.localeCompare(b.title));
            break;
        case 'words':
            sorted = articles.sort((a, b) => {
                const wordsA = a.content.replace(/<[^>]*>/g, '').length;
                const wordsB = b.content.replace(/<[^>]*>/g, '').length;
                return wordsB - wordsA;
            });
            break;
        default:
            sorted = articles;
    }
    
    displayArticles(sorted);
}

function deleteArticle(index) {
    if (confirm('确定要删除这篇文章吗？')) {
        const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
        articles.splice(index, 1);
        localStorage.setItem('blog-articles', JSON.stringify(articles));
        loadArticles();
    }
}

function exportAllArticles() {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    const dataStr = JSON.stringify(articles, null, 2);
    const dataBlob = new Blob([dataStr], {type: 'application/json'});
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `blog-articles-${new Date().toISOString().split('T')[0]}.json`;
    link.click();
    URL.revokeObjectURL(url);
    alert('✅ 文章导出成功！');
}

function showStats() {
    const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
    const totalWords = articles.reduce((sum, article) => 
        sum + article.content.replace(/<[^>]*>/g, '').split(/\s+/).filter(word => word.length > 0).length, 0
    );
    
    alert(`📊 博客统计\n\n文章总数: ${articles.length}\n总字数: ${totalWords}\n平均字数: ${Math.round(totalWords / articles.length) || 0}`);
}
</script>
</body>
</html>
