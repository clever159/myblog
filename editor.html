<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>编辑文章</title>
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      color: white;
      font-family: sans-serif;
      padding: 20px;
    }

    h1, input {
      text-align: center;
      width: 100%;
    }

    #editorContainer {
      max-width: 800px;
      margin: auto;
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 12px;
      backdrop-filter: blur(10px);
    }

    #title {
      width: 100%;
      font-size: 1.5rem;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      border: none;
    }

    #editor {
      height: 300px;
      background: white;
      color: black;
      border-radius: 10px;
      padding: 10px;
    }

    .btns {
      margin-top: 20px;
      text-align: center;
    }

    button {
      background: #4ECDC4;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 1rem;
      border-radius: 25px;
      margin: 0 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="editorContainer">
    <h1>编辑文章</h1>
    <input type="text" id="title" placeholder="请输入文章标题">
    <div id="editor"></div>
    <div class="btns">
      <button onclick="save()">保存</button>
      <button onclick="goBack()">返回列表</button>
    </div>
  </div>

  <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const index = urlParams.has('index') ? parseInt(urlParams.get('index')) : null;

    const quill = new Quill('#editor', { theme: 'snow' });

    if (index !== null) {
      const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');
      if (articles[index]) {
        document.getElementById('title').value = articles[index].title;
        quill.root.innerHTML = articles[index].content;
      }
    }

    function save() {
      const title = document.getElementById('title').value.trim();
      const content = quill.root.innerHTML;
      if (!title) return alert("标题不能为空");

      const articles = JSON.parse(localStorage.getItem('blog-articles') || '[]');

      const newData = { title, content };
      if (index !== null) {
        articles[index] = newData;
      } else {
        articles.push(newData);
      }

      localStorage.setItem('blog-articles', JSON.stringify(articles));
      alert("保存成功！");
    }

    function goBack() {
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
